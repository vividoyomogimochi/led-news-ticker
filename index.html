<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Station News Ticker</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #1a1a1a;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        font-family: sans-serif;
      }
      .board {
        background: #0a0a0a;
        overflow: hidden;
        width: 700px;
      }
      .ticker-wrap {
        background: #000;
        padding: 8px 0;
      }
      #ledCanvas { display: block; }
    </style>
  </head>
  <body>
    <div class="board">
      <div class="ticker-wrap">
        <canvas id="ledCanvas"></canvas>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
