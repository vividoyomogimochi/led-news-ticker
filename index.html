<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LED News Ticker</title>
    <meta name="description" content="LED news ticker with pre-built bitmap font atlas for consistent rendering across all browsers.">
    <meta property="og:title" content="LED News Ticker">
    <meta property="og:type" content="website">
    <meta property="og:image" content="%VITE_HOST%/images/og.png">
    <meta property="og:description" content="LED news ticker with pre-built bitmap font atlas for consistent rendering across all browsers.">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" type="image/png" href="/favicon/32x32.png" sizes="32x32">
    <link rel="icon" type="image/png" href="/favicon/16x16.png" sizes="16x16">
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #111 center / cover;
        color: #eee;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 16px;
        min-height: 100vh;
        gap: 24px;
      }
      h1 {
        font-size: 1.2rem;
        color: #aaa;
        letter-spacing: 0.1em;
      }
      .frame-container {
        width: 100%;
        border: 2px solid #333;
        border-radius: 8px;
        overflow: hidden;
        background: #000;
        padding: 8px 0;
      }
      iframe {
        display: block;
        width: 100%;
        height: 0;
        border: none;
      }
      #audio-overlay {
        display: none;
        position: fixed;
        inset: 0;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      #audio-overlay.visible {
        display: flex;
      }
      #audio-overlay-btn {
        background: rgba(0, 0, 0, 0.75);
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 16px;
        color: #fff;
        cursor: pointer;
        padding: 24px 36px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        font-family: sans-serif;
        font-size: 1rem;
        backdrop-filter: blur(8px);
        transition: background 0.2s, border-color 0.2s;
        user-select: none;
      }
      #audio-overlay-btn:hover {
        background: rgba(0, 0, 0, 0.9);
        border-color: rgba(255, 255, 255, 0.6);
      }
      #audio-overlay-btn svg {
        width: 48px;
        height: 48px;
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div id="audio-overlay">
      <button id="audio-overlay-btn" aria-label="音楽を再生">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        クリックして音楽を再生
      </button>
    </div>
    <div class="frame-container">
      <iframe src="/ticker/" title="LED News Ticker" scrolling="no"></iframe>
    </div>
    <script>
      // Forward query params to the ticker iframe
      const iframe = document.querySelector('iframe');
      if (iframe && location.search) {
        iframe.src = '/ticker/' + location.search;
      }

      // Apply background-image from query param
      const _params = new URLSearchParams(location.search);
      const _bg = _params.get('bg') || '%VITE_DEFAULT_BG%';
      if (_bg) {
        document.body.style.backgroundImage = `url("${_bg.replace(/"/g, '%22')}")`;
      }

      // Background audio — no crossorigin attribute, so CORS is not enforced
      const _audioUrl = _params.get('audio');
      if (_audioUrl) {
        const audio = new Audio(_audioUrl);
        audio.loop = true;
        audio.volume = 0.5;
        audio.play().catch(() => {
          // Autoplay blocked — show overlay to prompt user interaction
          const overlay = document.getElementById('audio-overlay');
          const btn = document.getElementById('audio-overlay-btn');
          overlay.classList.add('visible');
          const resume = () => {
            audio.play().catch(() => {});
            overlay.classList.remove('visible');
            btn.removeEventListener('click', resume);
            document.removeEventListener('keydown', resume);
          };
          btn.addEventListener('click', resume);
          document.addEventListener('keydown', resume);
        });
      }

      window.addEventListener('message', (e) => {
        if (e.data?.type === 'ticker-height') {
          if (iframe) iframe.style.height = e.data.height + 'px';
        }
      });
    </script>
  </body>
</html>
