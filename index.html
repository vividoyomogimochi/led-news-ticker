<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LED News Ticker</title>
    <meta name="description" content="LED news ticker with pre-built bitmap font atlas for consistent rendering across all browsers.">
    <meta property="og:title" content="LED News Ticker">
    <meta property="og:type" content="website">
    <meta property="og:image" content="%VITE_HOST%/images/og.jpg">
    <meta property="og:description" content="LED news ticker with pre-built bitmap font atlas for consistent rendering across all browsers.">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" type="image/png" href="/favicon/32x32.png" sizes="32x32">
    <link rel="icon" type="image/png" href="/favicon/16x16.png" sizes="16x16">
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #111 center / cover;
        color: #eee;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 16px;
        min-height: 100vh;
        gap: 24px;
      }
      h1 {
        font-size: 1.2rem;
        color: #aaa;
        letter-spacing: 0.1em;
      }
      .frame-container {
        width: 100%;
        border: 2px solid #333;
        border-radius: 8px;
        overflow: hidden;
        background: #000;
        padding: 8px 0;
      }
      iframe {
        display: block;
        width: 100%;
        height: 0;
        border: none;
      }
      #audio-overlay {
        display: none;
        position: fixed;
        inset: 0;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      #audio-overlay.visible {
        display: flex;
      }
      #audio-overlay-btn {
        background: rgba(0, 0, 0, 0.75);
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 16px;
        color: #fff;
        cursor: pointer;
        padding: 24px 36px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        font-family: sans-serif;
        font-size: 1rem;
        backdrop-filter: blur(8px);
        transition: background 0.2s, border-color 0.2s;
        user-select: none;
      }
      #audio-overlay-btn:hover {
        background: rgba(0, 0, 0, 0.9);
        border-color: rgba(255, 255, 255, 0.6);
      }
      #audio-overlay-btn svg {
        width: 48px;
        height: 48px;
        opacity: 0.9;
      }
      #settings-corner {
        position: fixed;
        bottom: 0;
        right: 0;
        width: 80px;
        height: 80px;
        z-index: 1000;
      }
      #settings-btn {
        position: absolute;
        bottom: 14px;
        right: 14px;
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: rgba(15, 15, 15, 0.85);
        border: 1.5px solid rgba(255, 170, 0, 0.35);
        color: rgba(255, 170, 0, 0.75);
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        cursor: pointer;
        opacity: 0;
        transform: scale(0.7);
        transition: opacity 0.18s ease, transform 0.18s ease, border-color 0.18s, color 0.18s, background 0.18s;
        pointer-events: none;
        backdrop-filter: blur(6px);
      }
      #settings-corner:hover #settings-btn,
      #settings-btn.visible {
        opacity: 1;
        transform: scale(1);
        pointer-events: auto;
      }
      #settings-btn:hover {
        border-color: rgba(255, 170, 0, 0.85);
        color: #ffcc33;
        background: rgba(40, 28, 0, 0.92);
      }
      #settings-btn svg {
        width: 20px;
        height: 20px;
      }
      @keyframes settings-hint-blink {
        0%, 100% {
          border-color: rgba(255, 170, 0, 0.35);
          color: rgba(255, 170, 0, 0.75);
          background: rgba(15, 15, 15, 0.85);
        }
        50% {
          border-color: rgba(255, 200, 50, 0.9);
          color: #ffcc33;
          background: rgba(50, 35, 0, 0.9);
        }
      }
      #settings-btn.hint {
        animation: settings-hint-blink 2.2s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div id="settings-corner">
      <a id="settings-btn" href="/config/" aria-label="設定を開く">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      </a>
    </div>
    <div id="audio-overlay">
      <button id="audio-overlay-btn" aria-label="音楽を再生">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        クリックして音楽を再生
      </button>
    </div>
    <div class="frame-container">
      <iframe src="/ticker/" title="LED News Ticker" scrolling="no"></iframe>
    </div>
    <script>
      // Forward query params to the ticker iframe
      const iframe = document.querySelector('iframe');
      if (iframe && location.search) {
        iframe.src = '/ticker/' + location.search;
      }

      // Apply background-image from query param
      const _params = new URLSearchParams(location.search);
      const _bg = _params.get('bg') || '%VITE_DEFAULT_BG%';
      if (_bg) {
        document.body.style.backgroundImage = `url("${_bg.replace(/"/g, '%22')}")`;
      }

      // Background audio — no crossorigin attribute, so CORS is not enforced
      const _audioUrl = _params.get('audio');
      if (_audioUrl) {
        const audio = new Audio(_audioUrl);
        audio.loop = true;
        audio.volume = 0.5;
        audio.play().catch(() => {
          // Autoplay blocked — show overlay to prompt user interaction
          const overlay = document.getElementById('audio-overlay');
          const btn = document.getElementById('audio-overlay-btn');
          overlay.classList.add('visible');
          const resume = () => {
            audio.play().catch(() => {});
            overlay.classList.remove('visible');
            btn.removeEventListener('click', resume);
            document.removeEventListener('keydown', resume);
          };
          btn.addEventListener('click', resume);
          document.addEventListener('keydown', resume);
        });
      }

      // Settings button: show on corner hover/tap, hide on click elsewhere
      (function () {
        const corner = document.getElementById('settings-corner');
        const btn = document.getElementById('settings-btn');
        let justShown = false;

        // Default mode: no meaningful params other than 'type' are set
        const _p = new URLSearchParams(location.search);
        const _hasConfig = ['url', 'bg', 'audio', 'interval', 'segmentType'].some(k => _p.has(k));
        if (!_hasConfig) {
          btn.classList.add('visible', 'hint');
          const hintTimer = setTimeout(() => {
            btn.classList.remove('visible', 'hint');
          }, 30000);
          btn.addEventListener('click', () => clearTimeout(hintTimer), { once: true });
        }

        corner.addEventListener('touchstart', (e) => {
          if (!btn.classList.contains('visible')) {
            btn.classList.add('visible');
            btn.classList.remove('hint');
            e.preventDefault(); // suppress the follow-up click so navigation doesn't fire immediately
            e.stopPropagation();
          }
        }, { passive: false });

        corner.addEventListener('click', (e) => { e.stopPropagation(); });

        document.addEventListener('click', () => {
          if (!justShown) {
            btn.classList.remove('visible', 'hint');
          }
        });
      })();

      window.addEventListener('message', (e) => {
        if (e.data?.type === 'ticker-height') {
          if (iframe) iframe.style.height = e.data.height + 'px';
        }
      });
    </script>
  </body>
</html>
