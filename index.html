<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LED News Ticker</title>
    <meta name="description" content="LED news ticker with pre-built bitmap font atlas for consistent rendering across all browsers.">
    <meta property="og:title" content="LED News Ticker">
    <meta property="og:type" content="website">
    <meta property="og:image" content="%VITE_HOST%/images/og.png">
    <meta property="og:description" content="LED news ticker with pre-built bitmap font atlas for consistent rendering across all browsers.">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" type="image/png" href="/favicon/32x32.png" sizes="32x32">
    <link rel="icon" type="image/png" href="/favicon/16x16.png" sizes="16x16">
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #111 center / cover;
        color: #eee;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 16px;
        min-height: 100vh;
        gap: 24px;
      }
      h1 {
        font-size: 1.2rem;
        color: #aaa;
        letter-spacing: 0.1em;
      }
      .frame-container {
        width: 100%;
        border: 2px solid #333;
        border-radius: 8px;
        overflow: hidden;
        background: #000;
        padding: 8px 0;
      }
      iframe {
        display: block;
        width: 100%;
        height: 0;
        border: none;
      }
    </style>
  </head>
  <body>
    <div class="frame-container">
      <iframe src="/ticker/" title="LED News Ticker" scrolling="no"></iframe>
    </div>
    <script>
      // Forward query params to the ticker iframe
      const iframe = document.querySelector('iframe');
      if (iframe && location.search) {
        iframe.src = '/ticker/' + location.search;
      }

      // Apply background-image from query param
      const _params = new URLSearchParams(location.search);
      const _bg = _params.get('bg') || '/images/wall.jpg';
      if (_bg) {
        document.body.style.backgroundImage = `url("${_bg.replace(/"/g, '%22')}")`;
      }

      // Background audio — no crossorigin attribute, so CORS is not enforced
      const _audioUrl = _params.get('audio');
      if (_audioUrl) {
        const audio = new Audio(_audioUrl);
        audio.loop = true;
        audio.volume = 0.5;
        audio.play().catch(() => {
          // Autoplay blocked — play on first user interaction
          const resume = () => {
            audio.play().catch(() => {});
            document.removeEventListener('click', resume);
            document.removeEventListener('keydown', resume);
          };
          document.addEventListener('click', resume);
          document.addEventListener('keydown', resume);
        });
      }

      window.addEventListener('message', (e) => {
        if (e.data?.type === 'ticker-height') {
          if (iframe) iframe.style.height = e.data.height + 'px';
        }
      });
    </script>
  </body>
</html>
