<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LED News Ticker — Config</title>
    <meta name="description" content="LED news ticker with pre-built bitmap font atlas for consistent rendering across all browsers.">
    <meta property="og:title" content="LED News Ticker">
    <meta property="og:type" content="website">
    <meta property="og:image" content="%VITE_HOST%/images/og.jpg">
    <meta property="og:description" content="LED news ticker with pre-built bitmap font atlas for consistent rendering across all browsers.">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" type="image/png" href="/favicon/32x32.png" sizes="32x32">
    <link rel="icon" type="image/png" href="/favicon/16x16.png" sizes="16x16">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <script type="module" src="./src/main.ts"></script>
  </head>
  <body style="background:#070707;visibility:hidden">
    <div class="header">
      <p class="logo">LED News Ticker</p>
      <h1>Config</h1>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="theme">Theme</button>
      <button class="tab-btn" data-tab="customize">Customize</button>
      <button class="tab-btn" data-tab="help">Help</button>
    </div>

    <!-- Theme -->
    <div class="panel active" id="panel-theme">
      <div class="theme-section">
        <p class="theme-section-title">Source</p>
        <select id="theme-source-select"></select>
      </div>
      <div class="theme-section">
        <p class="theme-section-title">Display</p>
        <div class="theme-grid" id="theme-display-grid">
          <p class="theme-empty">読み込み中...</p>
        </div>
      </div>
      <div class="theme-actions">
        <button class="theme-btn theme-btn-primary" id="theme-open-btn" type="button">ティッカーを開く →</button>
        <button class="theme-btn" id="theme-customize-btn" type="button">カスタマイズ →</button>
      </div>
    </div>

    <!-- Customize -->
    <form class="panel" id="panel-customize">
      <div class="field">
        <label>ソース種別</label>
        <div class="source-type-row">
          <label class="radio-label">
            <input type="radio" name="source-type" value="rss" checked />
            RSS
          </label>
          <label class="radio-label">
            <input type="radio" name="source-type" value="ws" />
            WebSocket
          </label>
          <label class="radio-label">
            <input type="radio" name="source-type" value="sse" />
            SSE
          </label>
        </div>
      </div>

      <div id="cust-rss-fields">
        <div class="field">
          <label for="cust-rss-url">フィード URL</label>
          <input id="cust-rss-url" type="url" placeholder="https://example.com/feed.xml" />
        </div>
        <div class="field">
          <label for="cust-rss-interval">取得間隔</label>
          <div class="row">
            <input id="cust-rss-interval" type="number" min="1" value="5" />
            <span class="unit">分</span>
          </div>
        </div>
        <div class="field">
          <label class="checkbox-label">
            <input id="cust-rss-proxy" type="checkbox" checked />
            CORSプロキシを使用する
          </label>
          <p class="hint">フィードが CORS に対応している場合はオフにできます</p>
        </div>
      </div>

      <div id="cust-ws-fields" style="display:none">
        <div class="field">
          <label for="cust-ws-url">WebSocket URL</label>
          <input id="cust-ws-url" type="url" placeholder="ws://localhost:8080" />
        </div>
      </div>

      <div id="cust-sse-fields" style="display:none">
        <div class="field">
          <label for="cust-sse-url">SSE URL</label>
          <input id="cust-sse-url" type="url" placeholder="http://localhost:8080/events" />
        </div>
      </div>

      <hr class="divider" />

      <div class="field">
        <label for="cust-bg">壁紙 URL</label>
        <input id="cust-bg" type="text" placeholder="https://example.com/bg.jpg" />
        <p class="hint">ページの背景に適用されます</p>
      </div>

      <div class="field">
        <label for="cust-audio">BGM URL</label>
        <input id="cust-audio" type="text" placeholder="https://example.com/audio.mp3" />
        <p class="hint">ループ再生されます</p>
      </div>

      <hr class="divider" />

      <div class="color-group">
        <p class="color-group-title">LED カラー（任意）</p>
        <div class="color-row">
          <label for="cust-normalColor">通常</label>
          <input id="cust-normalColor" type="color" value="#e0e0e0" />
          <input id="cust-normalColor-hex" type="text" placeholder="#e0e0e0" />
        </div>
        <div class="color-row">
          <label for="cust-accentColor">アクセント</label>
          <input id="cust-accentColor" type="color" value="#ffdd33" />
          <input id="cust-accentColor-hex" type="text" placeholder="#ffdd33" />
        </div>
        <div class="color-row">
          <label for="cust-sepColor">区切り</label>
          <input id="cust-sepColor" type="color" value="#cc2200" />
          <input id="cust-sepColor-hex" type="text" placeholder="#cc2200" />
        </div>
        <p class="hint">空欄でデフォルト色を使用</p>
      </div>

      <button type="submit">ティッカーを開く →</button>
    </form>

    <!-- Help -->
    <div class="panel help-content" id="panel-help">
      <!--HELP_CONTENT-->
      <template id="contact-section"><hr class="divider" /><div class="contact"><p>お問い合わせ: <a href="mailto:%VITE_CONTACT%">%VITE_CONTACT%</a></p></div></template>
    </div>

    <div class="preview" id="preview"></div>

    <template id="sse-data-info">
      <div class="data-info">
        <p class="data-info-title">受信データ形式（SSE）</p>
        <div class="data-block">
          <p class="data-block-label">JSON（推奨）</p>
          <pre><code>data: { "text": "表示テキスト", "type": "normal" }</code></pre>
          <p class="hint">
            <code>type</code> は省略可。<br />値: <code>normal</code> / <code>accent</code>
          </p>
        </div>
        <div class="data-block">
          <p class="data-block-label">プレーンテキスト</p>
          <pre><code>data: 表示テキスト</code></pre>
          <p class="hint">JSON でない文字列はそのまま表示。</p>
        </div>
      </div>
    </template>

    <template id="ws-data-info">
      <div class="data-info">
        <p class="data-info-title">受信データ形式</p>
        <div class="data-block">
          <p class="data-block-label">JSON（推奨）</p>
          <pre><code>{ "text": "表示テキスト", "type": "normal" }</code></pre>
          <p class="hint">
            <code>type</code> は省略可。<br />値: <code>normal</code> / <code>accent</code>
          </p>
        </div>
        <div class="data-block">
          <p class="data-block-label">プレーンテキスト</p>
          <pre><code>表示テキスト</code></pre>
          <p class="hint">JSON でない文字列はそのまま表示。</p>
        </div>
      </div>
    </template>

  </body>
</html>
